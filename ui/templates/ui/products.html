{% extends "ui/base.html" %}
{% load static %}

{% block title %}Products — Café de Paris{% endblock %}
{% block page_title %}Products{% endblock %}

{% block topbar_actions %}
<div style="display: flex; align-items: center; gap: 0.5rem;">
  <a href="/api/products/export-csv/" class="btn btn-ghost btn-sm" download>Download CSV</a>
  <label class="btn btn-primary btn-sm" style="cursor: pointer;">
    Upload CSV
    <input type="file" id="csv-upload" accept=".csv,text/csv" hidden>
  </label>
</div>
{% endblock %}

{% block content %}
<div class="card user-form-card" style="padding: 1.25rem 1.5rem; margin-bottom: 1.25rem;">
  <h3 id="form-title" style="margin: 0 0 1rem; font-size: 1rem;">Add product</h3>
  <form id="product-form">
    <div class="form-row">
      <div class="form-group">
        <label for="product-name">Name</label>
        <input type="text" id="product-name" name="name" required autocomplete="off">
      </div>
      <div class="form-group">
        <label for="product-category">Category</label>
        <select id="product-category" name="category" required>
          <option value="">Select category…</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="product-price">Selling price</label>
        <input type="number" id="product-price" name="selling_price" required min="0" step="0.01" placeholder="0.00">
      </div>
      <div class="form-group">
        <label for="product-tax">Tax rate (%)</label>
        <input type="number" id="product-tax" name="tax_rate" min="0" max="100" step="0.01" placeholder="15.5">
      </div>
      <div class="form-group">
        <label for="product-qty" id="product-qty-label">Initial qty</label>
        <input type="number" id="product-qty" name="remaining_qty" min="0" step="0.01" value="0">
      </div>
    </div>
    <div class="form-group">
      <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
        <input type="checkbox" id="product-active" name="is_active" checked>
        Active product
      </label>
    </div>
    <div style="display: flex; justify-content: flex-end; gap: 0.5rem;">
      <button type="button" class="btn btn-ghost" id="product-cancel" style="display: none;">Cancel</button>
      <button type="submit" class="btn btn-primary" id="product-submit">Add product</button>
    </div>
  </form>
</div>

<div class="products-toolbar">
  <input
    type="search"
    id="product-search"
    class="report-input"
    placeholder="Search products…"
    autocomplete="off"
  >
  <div class="pos-mode-toggle" id="product-view-toggle" role="radiogroup" aria-label="Product view">
    <button type="button" class="pos-mode-btn active" data-view="grid" aria-pressed="true" title="Card view">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
      Cards
    </button>
    <button type="button" class="pos-mode-btn" data-view="list" aria-pressed="false" title="List view">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><rect x="1" y="2" width="14" height="2" rx="0.5"/><rect x="1" y="7" width="14" height="2" rx="0.5"/><rect x="1" y="12" width="14" height="2" rx="0.5"/></svg>
      List
    </button>
  </div>
</div>
<div class="category-tabs" id="category-tabs" style="margin-bottom: 1.25rem;"></div>
<div class="product-grid-page" id="product-list">
  <div class="skeleton" style="height: 140px;"></div>
  <div class="skeleton" style="height: 140px;"></div>
  <div class="skeleton" style="height: 140px;"></div>
</div>
{% endblock %}

{% block extra_js %}
<script type="module">
import { apiGet, apiPost, apiPatch, apiUpload, unwrapList, formatCurrency, showToast } from "{% static 'ui/js/api.js' %}";
import { createSortState, sortItems, sortTh, actionTh, bindTableSort } from "{% static 'ui/js/table-sort.js' %}";

const VIEW_STORAGE_KEY = "products-view-mode";

function formatQty(value) {
  const qty = Number(value);
  return Number.isFinite(qty) ? qty.toLocaleString("en-US", { maximumFractionDigits: 2 }) : "0";
}

function formatPercent(value) {
  const rate = Number(value);
  return Number.isFinite(rate) ? `${rate.toLocaleString("en-US", { maximumFractionDigits: 2 })}%` : "0%";
}

let products = [];
let categories = [];
let editingId = null;
let activeCategory = "all";
let searchQuery = "";
let viewMode = localStorage.getItem(VIEW_STORAGE_KEY) === "list" ? "list" : "grid";
const productForm = document.getElementById("product-form");
const formTitle = document.getElementById("form-title");
const categorySelect = document.getElementById("product-category");
const productSubmit = document.getElementById("product-submit");
const productCancel = document.getElementById("product-cancel");
const qtyLabel = document.getElementById("product-qty-label");
const categoryTabs = document.getElementById("category-tabs");
const productSearchInput = document.getElementById("product-search");
const productList = document.getElementById("product-list");
const productViewToggle = document.getElementById("product-view-toggle");
const csvUpload = document.getElementById("csv-upload");
const sortState = createSortState("name", "asc");

const PRODUCT_SORT = {
  name: (p) => p.name || "",
  category_name: (p) => p.category_name || "",
  selling_price: (p) => Number(p.selling_price || 0),
  remaining_qty: (p) => Number(p.remaining_qty || 0),
  tax_rate: (p) => Number(p.tax_rate || 0),
  is_active: (p) => (p.is_active ? 1 : 0),
};

function renderCategoryOptions() {
  const options = categories.map(c => `<option value="${c.id}">${c.name}</option>`).join("");
  categorySelect.innerHTML = `<option value="">Select category…</option>${options}`;
  categorySelect.disabled = !categories.length;
  if (!categories.length) {
    categorySelect.innerHTML = `<option value="">No categories — add one in admin first</option>`;
  }
}

function resetForm() {
  editingId = null;
  formTitle.textContent = "Add product";
  productSubmit.textContent = "Add product";
  productCancel.style.display = "none";
  qtyLabel.textContent = "Initial qty";
  productForm.reset();
  document.getElementById("product-qty").value = "0";
  document.getElementById("product-active").checked = true;
}

function startEdit(product) {
  editingId = product.id;
  formTitle.textContent = "Edit product";
  productSubmit.textContent = "Save changes";
  productCancel.style.display = "";
  qtyLabel.textContent = "Qty";
  document.getElementById("product-name").value = product.name;
  categorySelect.value = String(product.category);
  document.getElementById("product-price").value = product.selling_price;
  document.getElementById("product-tax").value = product.tax_rate ?? "";
  document.getElementById("product-qty").value = product.remaining_qty ?? "0";
  document.getElementById("product-active").checked = product.is_active;
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function matchesSearch(product) {
  if (!searchQuery) return true;
  const haystack = [product.name, product.category_name]
    .filter(Boolean)
    .join(" ")
    .toLowerCase();
  return haystack.includes(searchQuery);
}

function recipeLink(product) {
  if (product.category_name === "Ingredients") return "";
  return `<a href="/recipes/?product=${product.id}" class="btn btn-ghost btn-sm">Recipe</a>`;
}

function renderProductCard(p) {
  return `
    <div class="card" style="padding: 1.25rem 1.5rem;">
      <div style="display: flex; justify-content: space-between; align-items: start; gap: 0.5rem;">
        <h3 style="margin: 0; font-size: 1rem;">${p.name}</h3>
        <div style="display: flex; align-items: center; gap: 0.5rem;">
          <span class="badge ${p.is_active ? "badge-active" : "badge-inactive"}">${p.is_active ? "Active" : "Inactive"}</span>
          ${recipeLink(p)}
          <button type="button" class="btn btn-ghost btn-sm" data-edit="${p.id}">Edit</button>
        </div>
      </div>
      <p style="margin: 0.5rem 0; color: var(--color-muted); font-size: 0.85rem;">${p.category_name}</p>
      <div style="display: flex; justify-content: space-between; align-items: end; gap: 0.75rem; margin-top: 0.75rem;">
        <p style="margin: 0; font-family: Fraunces, Georgia, serif; font-size: 1.35rem; font-weight: 600; color: var(--color-amber-glow);">
          ${formatCurrency(p.selling_price)}
        </p>
        <div style="text-align: right; font-size: 0.8rem; color: var(--color-muted);">
          <div>Qty: <strong style="color: var(--color-espresso);">${formatQty(p.remaining_qty)}</strong></div>
          <div>Tax: <strong style="color: var(--color-espresso);">${formatPercent(p.tax_rate)}</strong></div>
        </div>
      </div>
    </div>
  `;
}

function renderProductTable(filtered) {
  const sorted = sortItems(filtered, sortState, PRODUCT_SORT);

  return `
    <div class="card" style="padding: 0;">
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              ${sortTh("Name", "name", sortState)}
              ${sortTh("Category", "category_name", sortState)}
              ${sortTh("Price", "selling_price", sortState, { align: "right" })}
              ${sortTh("Qty", "remaining_qty", sortState, { align: "right" })}
              ${sortTh("Tax", "tax_rate", sortState, { align: "right" })}
              ${sortTh("Status", "is_active", sortState)}
              ${actionTh()}
            </tr>
          </thead>
          <tbody>
            ${sorted.map(p => `
              <tr>
                <td><strong>${p.name}</strong></td>
                <td>${p.category_name}</td>
                <td style="text-align: right;">${formatCurrency(p.selling_price)}</td>
                <td style="text-align: right;">${formatQty(p.remaining_qty)}</td>
                <td style="text-align: right;">${formatPercent(p.tax_rate)}</td>
                <td><span class="badge ${p.is_active ? "badge-active" : "badge-inactive"}">${p.is_active ? "Active" : "Inactive"}</span></td>
                <td style="text-align: right;">
                  ${recipeLink(p)}
                  <button type="button" class="btn btn-ghost btn-sm" data-edit="${p.id}">Edit</button>
                </td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function updateViewToggle() {
  productViewToggle.querySelectorAll(".pos-mode-btn").forEach(btn => {
    const active = btn.dataset.view === viewMode;
    btn.classList.toggle("active", active);
    btn.setAttribute("aria-pressed", active ? "true" : "false");
  });
}

function render() {
  const categories = [...new Set(products.map(p => p.category_name))].sort();
  const tabs = ["all", ...categories];

  categoryTabs.innerHTML = tabs.map(cat => `
    <button class="category-tab${activeCategory === cat ? " active" : ""}" data-cat="${cat}">
      ${cat === "all" ? "All" : cat}
    </button>
  `).join("");

  let filtered = activeCategory === "all"
    ? products
    : products.filter(p => p.category_name === activeCategory);
  filtered = filtered.filter(matchesSearch);

  updateViewToggle();
  productList.classList.toggle("product-grid-page", viewMode === "grid");

  if (!filtered.length) {
    const message = searchQuery ? "No matching products" : "No products found";
    if (viewMode === "list") {
      productList.innerHTML = `<div class="card" style="padding: 0;"><div class="empty-state"><p>${message}</p></div></div>`;
    } else {
      productList.innerHTML = `<div class="empty-state" style="grid-column: 1/-1;"><p>${message}</p></div>`;
    }
    return;
  }

  if (viewMode === "list") {
    productList.innerHTML = renderProductTable(filtered);
    bindTableSort(productList, sortState, render);
  } else {
    productList.innerHTML = filtered.map(renderProductCard).join("");
  }
}

async function loadProducts() {
  const productsData = await apiGet("/products/?exclude_category=Ingredients&page_size=500");
  products = unwrapList(productsData);
  render();
}

async function loadCategories() {
  const data = await apiGet("/categories/?page_size=500");
  categories = unwrapList(data).filter(c => c.name !== "Ingredients");
  renderCategoryOptions();
}

productForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  productSubmit.disabled = true;

  const taxRaw = document.getElementById("product-tax").value.trim();
  const qtyRaw = document.getElementById("product-qty").value.trim();

  const payload = {
    name: document.getElementById("product-name").value.trim(),
    category: Number(categorySelect.value),
    selling_price: document.getElementById("product-price").value,
    is_active: document.getElementById("product-active").checked,
  };
  if (taxRaw) payload.tax_rate = taxRaw;
  if (qtyRaw || editingId) payload.remaining_qty = qtyRaw || "0";

  try {
    if (editingId) {
      await apiPatch(`/products/${editingId}/`, payload);
      showToast("Product updated");
    } else {
      await apiPost("/products/", payload);
      showToast("Product added");
    }
    resetForm();
    await loadProducts();
  } catch (err) {
    showToast(err.message, true);
  } finally {
    productSubmit.disabled = false;
  }
});

productCancel.addEventListener("click", resetForm);

productList.addEventListener("click", (e) => {
  const btn = e.target.closest("[data-edit]");
  if (!btn) return;
  const product = products.find(p => String(p.id) === btn.dataset.edit);
  if (product) startEdit(product);
});

categoryTabs.addEventListener("click", (e) => {
  const tab = e.target.closest(".category-tab");
  if (!tab) return;
  activeCategory = tab.dataset.cat;
  render();
});

productSearchInput.addEventListener("input", () => {
  searchQuery = productSearchInput.value.trim().toLowerCase();
  render();
});

productViewToggle.addEventListener("click", (e) => {
  const btn = e.target.closest(".pos-mode-btn[data-view]");
  if (!btn || btn.dataset.view === viewMode) return;
  viewMode = btn.dataset.view;
  localStorage.setItem(VIEW_STORAGE_KEY, viewMode);
  render();
});

csvUpload.addEventListener("change", async (e) => {
  const file = e.target.files[0];
  e.target.value = "";
  if (!file) return;

  const formData = new FormData();
  formData.append("file", file);

  try {
    const result = await apiUpload("/products/import-csv/", formData);
    const parts = [];
    if (result.created) parts.push(`${result.created} created`);
    if (result.updated) parts.push(`${result.updated} updated`);
    showToast(parts.length ? `Import complete: ${parts.join(", ")}` : "Import complete");
    await loadProducts();
  } catch (err) {
    let message = err.message;
    try {
      const data = JSON.parse(err.message);
      if (data?.errors?.length) {
        const preview = data.errors.slice(0, 3).map(e => `row ${e.row}: ${e.message}`).join("; ");
        message = `Import failed — ${preview}`;
      }
    } catch {
      // use raw message
    }
    showToast(message, true);
  }
});

Promise.all([loadCategories(), loadProducts()]).catch(err => {
  productList.innerHTML = `<div class="empty-state" style="grid-column: 1/-1;">Failed to load products: ${err.message}</div>`;
});
</script>
{% endblock %}
