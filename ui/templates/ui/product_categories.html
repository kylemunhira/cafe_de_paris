{% extends "ui/base.html" %}
{% load static %}

{% block title %}List Product Categories — Café de Paris{% endblock %}
{% block page_title %}List Product Categories{% endblock %}

{% block content %}
<div class="card user-form-card" style="padding: 1.25rem 1.5rem; margin-bottom: 1.25rem;">
  <h3 id="form-title" style="margin: 0 0 1rem; font-size: 1rem;">Add category</h3>
  <form id="category-form">
    <div class="form-row">
      <div class="form-group">
        <label for="category-name">Name</label>
        <input type="text" id="category-name" required autocomplete="off">
      </div>
      <div class="form-group" style="display: flex; align-items: end;">
        <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; margin-bottom: 0.35rem;">
          <input type="checkbox" id="category-is-asset">
          Asset category (monthly stock take only)
        </label>
      </div>
    </div>
    <div style="display: flex; justify-content: flex-end; gap: 0.5rem;">
      <button type="button" class="btn btn-ghost" id="cancel-btn" style="display: none;">Cancel</button>
      <button type="submit" class="btn btn-primary" id="submit-btn">Add category</button>
    </div>
  </form>
</div>

<div class="card" style="padding: 0;">
  <div style="padding: 1rem 1.5rem; border-bottom: 1px solid rgba(44,24,16,0.06);">
    <input
      type="search"
      id="category-search"
      class="report-input"
      placeholder="Search categories…"
      style="max-width: 320px;"
      autocomplete="off"
    >
  </div>
  <div class="table-wrap" id="categories-table">
    <div style="padding: 2rem; text-align: center;"><span class="loading-spinner"></span></div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script type="module">
import { apiGet, apiPost, apiPatch, apiDelete, unwrapList, showToast } from "{% static 'ui/js/api.js' %}";
import { createSortState, sortItems, sortTh, actionTh, bindTableSort } from "{% static 'ui/js/table-sort.js' %}";

const categoryForm = document.getElementById("category-form");
const formTitle = document.getElementById("form-title");
const nameInput = document.getElementById("category-name");
const isAssetInput = document.getElementById("category-is-asset");
const submitBtn = document.getElementById("submit-btn");
const cancelBtn = document.getElementById("cancel-btn");
const categoriesTable = document.getElementById("categories-table");
const searchInput = document.getElementById("category-search");

let categories = [];
let productCounts = new Map();
let activeProductCounts = new Map();
let editingId = null;
let searchQuery = "";
const sortState = createSortState("name");

function setFormMode(mode) {
  const isEdit = mode === "edit";
  editingId = isEdit ? editingId : null;
  formTitle.textContent = isEdit ? "Edit category" : "Add category";
  submitBtn.textContent = isEdit ? "Save changes" : "Add category";
  cancelBtn.style.display = isEdit ? "" : "none";
}

function resetForm() {
  categoryForm.reset();
  isAssetInput.checked = false;
  setFormMode("create");
}

function startEdit(category) {
  editingId = category.id;
  nameInput.value = category.name;
  isAssetInput.checked = category.is_asset;
  setFormMode("edit");
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function matchesSearch(category) {
  if (!searchQuery) return true;
  const haystack = [
    category.name,
    category.is_asset ? "asset yes" : "asset no",
  ]
    .filter(Boolean)
    .join(" ")
    .toLowerCase();
  return haystack.includes(searchQuery);
}

function render() {
  if (!categories.length) {
    categoriesTable.innerHTML = `<div class="empty-state" style="padding: 2rem;"><p>No categories yet</p></div>`;
    return;
  }

  const filtered = categories
    .map(c => ({
      ...c,
      product_count: productCounts.get(c.id) ?? 0,
    }))
    .filter(matchesSearch);

  if (!filtered.length) {
    categoriesTable.innerHTML = `<div class="empty-state" style="padding: 2rem;"><p>No matching categories</p></div>`;
    return;
  }

  const rows = sortItems(
    filtered,
    sortState,
    {
      name: c => c.name.toLowerCase(),
      is_asset: c => c.is_asset,
      product_count: c => c.product_count,
    },
  );

  categoriesTable.innerHTML = `
    <table class="data-table">
      <thead>
        <tr>
          ${sortTh("Name", "name", sortState)}
          ${sortTh("Asset", "is_asset", sortState)}
          ${sortTh("Products", "product_count", sortState, { align: "right" })}
          ${actionTh()}
        </tr>
      </thead>
      <tbody>
        ${rows.map(c => {
          const activeCount = activeProductCounts.get(c.id) ?? 0;
          const deleteDisabled = activeCount
            ? ' disabled title="Deactivate all products in this category first"'
            : "";
          return `
          <tr>
            <td><strong>${c.name}</strong></td>
            <td>${c.is_asset ? "Yes" : "No"}</td>
            <td style="text-align: right;">${c.product_count.toLocaleString()}</td>
            <td style="text-align: right;">
              <button type="button" class="btn btn-ghost btn-sm" data-edit="${c.id}">Edit</button>
              <button type="button" class="btn btn-ghost btn-sm" data-delete="${c.id}"${deleteDisabled}>Delete</button>
            </td>
          </tr>
        `;
        }).join("")}
      </tbody>
    </table>
  `;
  bindTableSort(categoriesTable, sortState, render);
}

async function loadProductCounts() {
  const data = await apiGet("/products/?page_size=500");
  productCounts = new Map();
  activeProductCounts = new Map();
  for (const product of unwrapList(data)) {
    productCounts.set(product.category, (productCounts.get(product.category) ?? 0) + 1);
    if (product.is_active) {
      activeProductCounts.set(
        product.category,
        (activeProductCounts.get(product.category) ?? 0) + 1,
      );
    }
  }
}

async function reload() {
  const data = await apiGet("/categories/?page_size=500");
  categories = unwrapList(data);
  await loadProductCounts();
  render();
}

categoryForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  submitBtn.disabled = true;

  const payload = {
    name: nameInput.value.trim(),
    is_asset: isAssetInput.checked,
  };

  try {
    if (editingId) {
      await apiPatch(`/categories/${editingId}/`, payload);
      showToast("Category updated");
    } else {
      await apiPost("/categories/", payload);
      showToast("Category added");
    }
    resetForm();
    await reload();
  } catch (err) {
    showToast(err.message, true);
  } finally {
    submitBtn.disabled = false;
  }
});

cancelBtn.addEventListener("click", resetForm);

categoriesTable.addEventListener("click", async (e) => {
  const editBtn = e.target.closest("[data-edit]");
  if (editBtn) {
    const category = categories.find(c => String(c.id) === editBtn.dataset.edit);
    if (category) startEdit(category);
    return;
  }

  const deleteBtn = e.target.closest("[data-delete]");
  if (!deleteBtn || deleteBtn.disabled) return;

  const category = categories.find(c => String(c.id) === deleteBtn.dataset.delete);
  if (!category) return;
  if (!window.confirm(`Delete category "${category.name}"?`)) return;

  try {
    await apiDelete(`/categories/${category.id}/`);
    showToast("Category deleted");
    if (editingId === category.id) resetForm();
    await reload();
  } catch (err) {
    showToast(err.message, true);
  }
});

searchInput.addEventListener("input", () => {
  searchQuery = searchInput.value.trim().toLowerCase();
  render();
});

reload();
</script>
{% endblock %}
