{% extends "ui/base.html" %}
{% load static %}

{% block title %}Receipts — Café de Paris{% endblock %}
{% block page_title %}Receipts{% endblock %}

{% block content %}
<div class="card" style="padding: 0;">
  <div style="padding: 1rem 1.5rem; border-bottom: 1px solid rgba(44,24,16,0.06); display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center;">
    <p style="margin: 0; font-size: 0.85rem; color: var(--text-muted);">Fiscal receipts issued after proforma approval</p>
    <input
      type="search"
      id="receipt-search"
      class="report-input"
      placeholder="Search fiscal receipt #, proforma #, order…"
      style="max-width: 360px; margin-left: auto;"
    >
  </div>
  <div class="table-wrap" id="receipts-table">
    <div style="padding: 2rem; text-align: center;"><span class="loading-spinner"></span></div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script type="module">
import { apiGet, unwrapList, formatCurrency, formatDate, showToast, setBaseCurrency } from "{% static 'ui/js/api.js' %}?v=2";
import { createSortState, sortItems, sortTh, actionTh, bindTableSort } from "{% static 'ui/js/table-sort.js' %}";

const invoicePrintUrlTemplate = "{% url 'ui:invoice-print' 0 %}".replace("/0/", "/{id}/");
const receiptPrintUrlTemplate = "{% url 'ui:receipt-print' 0 %}".replace("/0/", "/{id}/");

let fiscalReceipts = [];
let searchQuery = "";
let baseCurrency = null;
const container = document.getElementById("receipts-table");
const searchInput = document.getElementById("receipt-search");
const sortState = createSortState("fiscal_approved_at", "desc");

const RECEIPT_SORT = {
  fiscal_receipt_number: (o) => o.fiscal_receipt_number || "",
  receipt_number: (o) => o.receipt_number || "",
  id: (o) => Number(o.id),
  branch_name: (o) => o.branch_name || "",
  order_type: (o) => o.order_type || "",
  total_amount: (o) => Number(o.total_amount),
  amount_paid: (o) => Number(o.amount_paid),
  payment_currency: (o) => paymentCurrencyLabel(o),
  fiscal_approved_at: (o) => o.fiscal_approved_at || o.created_at || "",
};

function paymentCurrencyLabel(order) {
  if (order.payment_method === "account") {
    const code = order.payment_currency_code || order.payment_currency_name || "";
    return code
      ? `${order.payment_method_display || "Customer account"} · ${code}`
      : (order.payment_method_display || "Customer account");
  }
  if (order.payment_method === "multi" && order.payments?.length) {
    const codes = [...new Set(order.payments.map((p) => p.currency_code || p.currency_name).filter(Boolean))];
    return codes.length ? codes.join(" + ") : (order.payment_method_display || "Split");
  }
  return order.payment_currency_code || order.payment_currency_name || "—";
}

function matchesSearch(order) {
  if (!searchQuery) return true;
  const haystack = [
    order.fiscal_receipt_number,
    order.receipt_number,
    order.id,
    order.branch_name,
    order.payment_currency_name,
    order.payment_currency_code,
    order.payment_method_display,
    order.order_type,
  ]
    .filter(Boolean)
    .join(" ")
    .toLowerCase();
  return haystack.includes(searchQuery);
}

function formatPaidAmount(order) {
  if (order.amount_paid == null) return "—";
  if (order.payment_method === "multi" && order.payments?.length) {
    return order.payments
      .map((p) => formatCurrency(p.amount, {
        code: p.currency_code,
        symbol: p.currency_symbol,
      }))
      .join(" + ");
  }
  return formatCurrency(order.amount_paid, {
    code: order.payment_currency_code,
    symbol: order.payment_currency_symbol,
    name: order.payment_currency_name,
  });
}

function receiptActions(order) {
  return [
    `<a href="${invoicePrintUrlTemplate.replace("{id}", order.id)}" target="_blank" class="btn btn-accent btn-sm">A4 Invoice</a>`,
    `<a href="${receiptPrintUrlTemplate.replace("{id}", order.id)}" target="_blank" class="btn btn-ghost btn-sm">Receipt</a>`,
  ].join(" ");
}

function renderReceipts() {
  const filtered = sortItems(fiscalReceipts.filter(matchesSearch), sortState, RECEIPT_SORT);

  if (!filtered.length) {
    container.innerHTML = `<div class="empty-state"><p>${searchQuery ? "No matching fiscal receipts" : "No fiscal receipts yet"}</p></div>`;
    return;
  }

  container.innerHTML = `
    <table class="data-table">
      <thead>
        <tr>
          ${sortTh("Fiscal receipt #", "fiscal_receipt_number", sortState)}
          ${sortTh("Proforma #", "receipt_number", sortState)}
          ${sortTh("Order", "id", sortState)}
          ${sortTh("Branch", "branch_name", sortState)}
          ${sortTh("Type", "order_type", sortState)}
          ${sortTh("Total", "total_amount", sortState)}
          ${sortTh("Amount paid", "amount_paid", sortState)}
          ${sortTh("Currency", "payment_currency", sortState)}
          ${sortTh("Fiscalized", "fiscal_approved_at", sortState)}
          ${actionTh()}
        </tr>
      </thead>
      <tbody>
        ${filtered.map(o => `
          <tr>
            <td><strong>${o.fiscal_receipt_number || "—"}</strong></td>
            <td>${o.receipt_number || "—"}</td>
            <td>#${o.id}</td>
            <td>${o.branch_name}</td>
            <td>${o.order_type.replace("_", " ")}</td>
            <td>${formatCurrency(o.total_amount, baseCurrency)}</td>
            <td>${formatPaidAmount(o)}</td>
            <td>${paymentCurrencyLabel(o)}</td>
            <td>${o.fiscal_approved_at ? formatDate(o.fiscal_approved_at) : formatDate(o.created_at)}</td>
            <td style="white-space: nowrap;">${receiptActions(o)}</td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;
}

bindTableSort(container, sortState, renderReceipts);

searchInput.addEventListener("input", () => {
  searchQuery = searchInput.value.trim().toLowerCase();
  renderReceipts();
});

Promise.all([
  apiGet("/orders/?status=paid&fiscal_only=1&fiscal_approval_status=approved&page_size=500"),
  apiGet("/currencies/?page_size=500"),
])
  .then(([data, currenciesData]) => {
    fiscalReceipts = unwrapList(data);
    const currencies = unwrapList(currenciesData);
    baseCurrency = currencies.find((c) => c.is_base) || null;
    setBaseCurrency(baseCurrency);
    renderReceipts();
  })
  .catch((err) => {
    showToast(`Failed to load receipts: ${err.message}`, true);
    container.innerHTML = `<div class="empty-state">Failed to load receipts: ${err.message}</div>`;
  });
</script>
{% endblock %}
