{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Café de Paris</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'ui/css/app.css' %}">
</head>
<body class="login-page">
  <div class="login-shell">
    <div class="login-card card">
      <div class="login-brand">
        <h1>Café de Paris</h1>
        <p>Sign in to continue</p>
      </div>

      {% if form.errors %}
        <div class="login-error">Invalid username or password.</div>
      {% endif %}

      <form method="post" class="login-form">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">
        <div class="form-group">
          <label for="id_username">Username</label>
          <input type="text" name="username" id="id_username" required autofocus autocomplete="username">
        </div>
        <div class="form-group">
          <label for="id_password">Password</label>
          <input type="password" name="password" id="id_password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Sign in</button>
      </form>
    </div>
    <footer class="login-footer">Copyright © 2026 <a href="https://www.zimhope.co.zw/" target="_blank" rel="noopener noreferrer" class="page-footer-link">Zimhope</a>. All rights reserved.</footer>
  </div>
</body>
</html>
