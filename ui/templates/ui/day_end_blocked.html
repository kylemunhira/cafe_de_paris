{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day end blocked — Café de Paris</title>
  <link rel="stylesheet" href="{% static 'ui/css/receipt-print.css' %}">
</head>
<body>
  <div class="receipt" style="max-width: 420px; margin: 2rem auto;">
    <div class="center brand">
      <h1>Café de Paris</h1>
    </div>
    <div class="center meta">
      <p><strong>Completed daily stock take required</strong></p>
      <p>{{ branch.name }}</p>
      <p>{{ count_date }}</p>
    </div>
    <hr class="divider">
    <p style="text-align: center; line-height: 1.5;">
      {{ message }}
    </p>
    <p style="text-align: center; margin-top: 1.5rem;">
      <a href="{% url 'ui:stock-take' %}" style="font-weight: 600;">Go to stock take</a>
    </p>
  </div>
</body>
</html>
