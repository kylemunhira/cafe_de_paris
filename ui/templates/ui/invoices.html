{% extends "ui/base.html" %}
{% load static %}

{% block title %}Invoices — Café de Paris{% endblock %}
{% block page_title %}Paid Invoices{% endblock %}

{% block content %}
<div class="card" style="padding: 0;">
  <div style="padding: 1rem 1.5rem; border-bottom: 1px solid rgba(44,24,16,0.06); display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center;">
    <input
      type="search"
      id="invoice-search"
      class="report-input"
      placeholder="Search receipt #, order #, branch…"
      style="max-width: 320px;"
    >
  </div>
  <div class="table-wrap" id="invoices-table">
    <div style="padding: 2rem; text-align: center;"><span class="loading-spinner"></span></div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script type="module">
import { apiGet, unwrapList, formatCurrency, formatDate } from "{% static 'ui/js/api.js' %}";

const invoicePrintUrlTemplate = "{% url 'ui:invoice-print' 0 %}".replace("/0/", "/{id}/");
const receiptPrintUrlTemplate = "{% url 'ui:receipt-print' 0 %}".replace("/0/", "/{id}/");

let paidOrders = [];
let searchQuery = "";
const container = document.getElementById("invoices-table");
const searchInput = document.getElementById("invoice-search");

function matchesSearch(order) {
  if (!searchQuery) return true;
  const haystack = [
    order.receipt_number,
    order.id,
    order.branch_name,
    order.payment_currency_name,
    order.order_type,
  ]
    .filter(Boolean)
    .join(" ")
    .toLowerCase();
  return haystack.includes(searchQuery);
}

function formatPaidAmount(order) {
  if (order.amount_paid == null) return "—";
  const symbol = order.payment_currency_symbol || "";
  const value = Number(order.amount_paid);
  if (!Number.isFinite(value)) return "—";
  return `${symbol}${value.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
}

function renderInvoices() {
  const filtered = paidOrders.filter(matchesSearch);

  if (!filtered.length) {
    container.innerHTML = `<div class="empty-state"><p>${searchQuery ? "No matching invoices" : "No paid receipts yet"}</p></div>`;
    return;
  }

  container.innerHTML = `
    <table class="data-table">
      <thead>
        <tr>
          <th>Receipt #</th>
          <th>Order</th>
          <th>Branch</th>
          <th>Type</th>
          <th>Total</th>
          <th>Amount paid</th>
          <th>Date</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        ${filtered.map(o => `
          <tr>
            <td><strong>${o.receipt_number || "—"}</strong></td>
            <td>#${o.id}</td>
            <td>${o.branch_name}</td>
            <td>${o.order_type.replace("_", " ")}</td>
            <td>${formatCurrency(o.total_amount)}</td>
            <td>${formatPaidAmount(o)}${o.payment_currency_name ? ` <span style="color: var(--text-muted); font-size: 0.85em;">${o.payment_currency_name}</span>` : ""}</td>
            <td>${formatDate(o.created_at)}</td>
            <td style="white-space: nowrap;">
              <a href="${invoicePrintUrlTemplate.replace("{id}", o.id)}" target="_blank" class="btn btn-accent btn-sm">A4 Invoice</a>
              <a href="${receiptPrintUrlTemplate.replace("{id}", o.id)}" target="_blank" class="btn btn-ghost btn-sm">Receipt</a>
            </td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;
}

searchInput.addEventListener("input", () => {
  searchQuery = searchInput.value.trim().toLowerCase();
  renderInvoices();
});

apiGet("/orders/?status=paid")
  .then(data => {
    paidOrders = unwrapList(data);
    renderInvoices();
  })
  .catch(err => {
    container.innerHTML = `<div class="empty-state">Failed to load invoices: ${err.message}</div>`;
  });
</script>
{% endblock %}
