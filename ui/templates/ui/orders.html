{% extends "ui/base.html" %}
{% load static %}

{% block title %}Orders — Café de Paris{% endblock %}
{% block page_title %}Orders{% endblock %}

{% block topbar_actions %}
<a href="{% url 'ui:pos' %}" class="btn btn-accent btn-sm">New Sale</a>
{% endblock %}

{% block content %}
<div class="card" style="padding: 0;">
  <div style="padding: 1rem 1.5rem; border-bottom: 1px solid rgba(44,24,16,0.06); display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center;">
    <input
      type="search"
      id="order-search"
      class="report-input"
      placeholder="Search order #, branch, receipt #, staff…"
      style="max-width: 320px;"
      autocomplete="off"
    >
    <button class="category-tab active" data-filter="all">All</button>
    <button class="category-tab" data-filter="open">Open</button>
    <button class="category-tab" data-filter="paid">Paid</button>
    <button class="category-tab" data-filter="cancelled">Cancelled</button>
  </div>
  <div class="table-wrap" id="orders-table">
    <div style="padding: 2rem; text-align: center;"><span class="loading-spinner"></span></div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script type="module">
import { apiGet, apiPost, unwrapList, formatCurrency, formatDate, statusBadge, showToast } from "{% static 'ui/js/api.js' %}";
import { createSortState, sortItems, sortTh, actionTh, bindTableSort } from "{% static 'ui/js/table-sort.js' %}";

let allOrders = [];
let activeFilter = "all";
let searchQuery = "";
let currencies = [];
const container = document.getElementById("orders-table");
const searchInput = document.getElementById("order-search");
const sortState = createSortState("created_at", "desc");

const ORDER_SORT = {
  id: (o) => Number(o.id),
  branch_name: (o) => o.branch_name || "",
  order_type: (o) => o.order_type || "",
  items: (o) => o.items?.length || 0,
  total_amount: (o) => Number(o.total_amount),
  payment_currency_name: (o) => o.payment_currency_name || "",
  status: (o) => o.status || "",
  created_at: (o) => o.created_at || "",
};

function matchesSearch(order) {
  if (!searchQuery) return true;
  const itemNames = (order.items || []).map(i => i.product_name).filter(Boolean);
  const haystack = [
    order.id,
    order.branch_name,
    order.order_type,
    order.status,
    order.receipt_number,
    order.payment_currency_name,
    order.table_number,
    order.created_by_name,
    order.paid_by_name,
    ...itemNames,
  ]
    .filter(Boolean)
    .join(" ")
    .toLowerCase();
  return haystack.includes(searchQuery);
}

function renderOrders() {
  let filtered = activeFilter === "all"
    ? allOrders
    : allOrders.filter(o => o.status === activeFilter);
  filtered = filtered.filter(matchesSearch);

  filtered = sortItems(filtered, sortState, ORDER_SORT);

  if (!filtered.length) {
    const message = searchQuery || activeFilter !== "all"
      ? "No matching orders"
      : "No orders found";
    container.innerHTML = `<div class="empty-state"><p>${message}</p></div>`;
    return;
  }

  container.innerHTML = `
    <table class="data-table">
      <thead>
        <tr>
          ${sortTh("Order", "id", sortState)}
          ${sortTh("Branch", "branch_name", sortState)}
          ${sortTh("Type", "order_type", sortState)}
          ${sortTh("Items", "items", sortState)}
          ${sortTh("Total", "total_amount", sortState)}
          ${sortTh("Currency", "payment_currency_name", sortState)}
          ${sortTh("Status", "status", sortState)}
          ${sortTh("Date", "created_at", sortState)}
          ${actionTh()}
        </tr>
      </thead>
      <tbody>
        ${filtered.map(o => `
          <tr>
            <td><strong>#${o.id}</strong></td>
            <td>${o.branch_name}</td>
            <td>${o.order_type.replace("_", " ")}</td>
            <td>${o.items?.length || 0}</td>
            <td>${formatCurrency(o.total_amount)}</td>
            <td>${o.status === "paid" ? (o.payment_currency_name || "—") : "—"}</td>
            <td>${statusBadge(o.status)}</td>
            <td>${formatDate(o.created_at)}</td>
            <td>
              ${o.status === "open" ? `
                <button class="btn btn-accent btn-sm pay-btn" data-id="${o.id}">Pay</button>
                <button class="btn btn-ghost btn-sm cancel-btn" data-id="${o.id}">Cancel</button>
              ` : ""}
              ${o.status === "paid" && o.fiscal_approval_status !== "approved" ? `
                <button class="btn btn-ghost btn-sm void-btn" data-id="${o.id}">Void</button>
              ` : ""}
            </td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;
}

bindTableSort(container, sortState, renderOrders);

container.addEventListener("click", async (e) => {
  const cancelBtn = e.target.closest(".cancel-btn");
  if (cancelBtn) {
    const id = cancelBtn.dataset.id;
    if (!window.confirm(`Cancel unpaid order #${id}?`)) return;
    cancelBtn.disabled = true;
    try {
      const updated = await apiPost(`/orders/${id}/cancel/`, {});
      const order = allOrders.find(o => String(o.id) === id);
      if (order) {
        order.status = updated.status;
        order.cancelled_at = updated.cancelled_at;
        order.cancelled_by_name = updated.cancelled_by_name;
      }
      renderOrders();
      showToast(`Order #${id} cancelled`);
    } catch (err) {
      showToast(err.message, true);
      cancelBtn.disabled = false;
    }
    return;
  }

  const voidBtn = e.target.closest(".void-btn");
  if (voidBtn) {
    const id = voidBtn.dataset.id;
    if (!window.confirm(`Void paid order #${id}? Stock and account charges will be reversed.`)) return;
    voidBtn.disabled = true;
    try {
      const updated = await apiPost(`/orders/${id}/void/`, {});
      const order = allOrders.find(o => String(o.id) === id);
      if (order) {
        order.status = updated.status;
        order.cancelled_at = updated.cancelled_at;
        order.cancelled_by_name = updated.cancelled_by_name;
      }
      renderOrders();
      showToast(`Order #${id} voided`);
    } catch (err) {
      showToast(err.message, true);
      voidBtn.disabled = false;
    }
    return;
  }

  const btn = e.target.closest(".pay-btn");
  if (!btn) return;

  const id = btn.dataset.id;
  const options = currencies.filter(c => c.is_active);
  if (!options.length) {
    showToast("No currencies configured", true);
    return;
  }

  let currencyId = options[0].id;
  if (options.length > 1) {
    const labels = options.map((c, i) => {
      const rate = c.is_base ? "base" : (c.current_rate || "no rate");
      return `${i + 1}. ${c.name} (${rate})`;
    }).join("\n");
    const choice = window.prompt(`Select payment currency (enter number):\n${labels}`, "1");
    const index = Number(choice) - 1;
    if (!Number.isInteger(index) || index < 0 || index >= options.length) {
      showToast("Payment cancelled", true);
      return;
    }
    currencyId = options[index].id;
  }

  btn.disabled = true;
  btn.innerHTML = `<span class="loading-spinner"></span>`;

  try {
    const paid = await apiPost(`/orders/${id}/pay/`, { currency_id: currencyId });
    const order = allOrders.find(o => String(o.id) === id);
    if (order) {
      order.status = "paid";
      order.payment_currency_name = paid.payment_currency_name;
      order.amount_paid = paid.amount_paid;
      order.fiscal_approval_status = paid.fiscal_approval_status || "";
    }
    renderOrders();
    showToast(`Order #${id} paid in ${paid.payment_currency_name}`);
  } catch (err) {
    showToast(err.message, true);
    btn.textContent = "Pay";
    btn.disabled = false;
  }
});

searchInput.addEventListener("input", () => {
  searchQuery = searchInput.value.trim().toLowerCase();
  renderOrders();
});

document.querySelectorAll("[data-filter]").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll("[data-filter]").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    activeFilter = tab.dataset.filter;
    renderOrders();
  });
});

Promise.all([
  apiGet("/orders/"),
  apiGet("/currencies/?page_size=500"),
]).then(([ordersData, currenciesData]) => {
  allOrders = unwrapList(ordersData);
  currencies = unwrapList(currenciesData);
  renderOrders();
}).catch(err => {
  container.innerHTML = `<div class="empty-state">Failed to load orders: ${err.message}</div>`;
});
</script>
{% endblock %}
